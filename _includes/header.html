<header class="site-header" role="banner">
  <div class="container">
    <div class="header-inner">

      <!-- Logo -->
      <a href="/" class="site-logo" aria-label="{{ site.data.site.name }} — Home">
        <svg class="site-logo__mark" width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <polygon points="18,2 34,12 34,24 18,34 2,24 2,12" fill="none" stroke="#beb087" stroke-width="2"/>
          <polygon points="18,8 28,14 28,22 18,28 8,22 8,14" fill="#beb087" fill-opacity="0.18"/>
          <circle cx="18" cy="18" r="4" fill="#beb087"/>
        </svg>
        <span class="site-logo__text">Northstar <span>Visual</span></span>
      </a>

      <!-- Primary nav -->
      <nav aria-label="Main navigation">
        <ul class="site-nav" id="site-nav" role="list">
          {% for item in site.data.navigation.main %}
          <li>
            <a href="{{ item.url }}"{% if page.url == item.url or page.url contains item.url %} class="active" aria-current="page"{% endif %}>
              {{ item.label }}
            </a>
          </li>
          {% endfor %}
          <!-- Catalogue CTA visible in mobile nav only -->
          <li class="nav-catalogue-mobile">
            <a href="{{ site.data.site.catalogue_pdf }}" class="btn btn--primary" download>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-5 2h10v-1.5H3V14z"/></svg>
              {{ site.data.site.catalogue_label }}
            </a>
          </li>
        </ul>
      </nav>

      <!-- Header actions (desktop) -->
      <div class="header-actions">
        <a href="{{ site.data.site.catalogue_pdf }}" class="btn btn--primary btn--sm" download>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-5 2h10v-1.5H3V14z"/></svg>
          {{ site.data.site.catalogue_label }}
        </a>

        <!-- Hamburger -->
        <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Toggle navigation">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

    </div>
  </div>
</header>
