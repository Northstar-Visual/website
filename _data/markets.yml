    - nova-fine-pitch
    - apex-indoor
    - nova-control

- id: sports
  name: Sports Venues
  tagline: Captivate every fan in every seat
  description: >
    Stadium scoreboards, perimeter boards, concourse displays, and bowl-facing
    LED ribbons. Our outdoor and indoor display systems are trusted at UK
    football grounds, arenas, and motorsport circuits to deliver reliable
    high-impact content to large audiences.
  body_extended: >
    Northstar Visual products meet the technical requirements of major sporting
    bodies and broadcasters. We handle the full project lifecycle — from initial
    structural surveys and planning to installation, commissioning, and ongoing
    maintenance agreements.
  image: /assets/images/markets/sports.jpg
  image_alt: LED scoreboard at a UK football stadium
  featured: false
  products:
    - sentinel-outdoor
    - apex-indoor
    - nova-control

- id: dooh
  name: Digital Out-of-Home
  tagline: Outdoor advertising that commands attention
  description: >
    Roadside digital billboards, transport-hub displays, and high-footfall
    outdoor installations. Northstar Visual's Sentinel Outdoor Series combines
    IP65 weatherproofing with brightness levels that remain fully legible in
    direct sunlight — keeping advertising content visible and impactful
    regardless of conditions.
  body_extended: >
    We supply DOOH operators, media owners, and local authorities with
    outdoor LED infrastructure built to last. All outdoor products carry full
    CE certification and meet UK planning authority brightness guidelines.
  image: /assets/images/markets/dooh.jpg
  image_alt: Outdoor LED billboard in a city centre
  featured: false
  products:
    - sentinel-outdoor
